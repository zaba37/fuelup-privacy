<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garden Calendar</title>
    <style>
      :root {
        color-scheme: light;
        --green: #2e7d32;
        --text: #142119;
        --muted: #5f6b63;
        --bg: #f7faf7;
        --card: #ffffff;
        --line: #dfe8df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.75rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      a {
        color: var(--green);
        font-weight: 700;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Garden Calendar</h1>
        <p>Garden Calendar helps you track fertilizing, mowing, watering and other garden work in one simple local-first app.</p>
        <p>Kalendarz ogrodu pomaga zapisywac nawozenie, koszenie, podlewanie i inne prace w ogrodzie.</p>
        <nav>
          <a href="privacy/">Privacy Policy</a>
          <a href="support/">Support</a>
        </nav>
      </section>
    </main>
  </body>
</html>
